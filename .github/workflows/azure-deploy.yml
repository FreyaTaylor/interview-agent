name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  BACKEND_IMAGE_NAME: interview-agent-backend

jobs:
  deploy-backend:
    name: Build and deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile backend
        working-directory: java-backend
        run: mvn -B -DskipTests compile

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name "${{ secrets.AZURE_ACR_NAME }}"

      - name: Ensure Azure Container Apps CLI extension
        run: az extension add --name containerapp --upgrade

      - name: Build and push backend image
        env:
          ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME:$IMAGE_TAG" \
            -t "$ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME:latest" \
            java-backend
          docker push "$ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME:$IMAGE_TAG"
          docker push "$ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME:latest"

      - name: Deploy backend container app
        env:
          ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          az containerapp update \
            --name "${{ secrets.AZURE_BACKEND_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "$ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME:$IMAGE_TAG"

  deploy-frontend:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend-react
          api_location: ''
          output_location: dist
          app_build_command: npm run build