server:
  port: 8080
  # 让 Spring MVC 在虚拟线程上承载请求
  # (与 spring.threads.virtual.enabled 协同)

spring:
  application:
    name: interview-agent
  profiles:
    active: dev
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/interview_agent_java}
    username: ${DB_USER:iagent_java}
    password: ${DB_PASSWORD:iagent_java}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 2
      connection-timeout: 30000
      pool-name: iagent-hikari

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    table: flyway_schema_history

  # Spring AI: 用 OpenAI starter 指向 DeepSeek（OpenAI 兼容）
  # base-url 硬编码不读 .env 的 DEEPSEEK_BASE_URL —— 那个变量是 Python 用的（带 /v1），
  # Spring AI 会自动追加 /v1/chat/completions，再带 /v1 会变成 /v1/v1/...
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:dummy-local-key}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}
          temperature: 0.3
  # LLM 长输出（讲解 4096 token / 题目 5 道）需要更长的 HTTP 读超时
  http:
    client:
      connect-timeout: 30s
      read-timeout: 180s

  # 全局 Jackson：HTTP 请求/响应字段统一 snake_case（与 Python 端 + 前端约定一致）
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL

  servlet:
    multipart:
      # 与前端文案对齐：语音上传支持至 300MB
      max-file-size: 300MB
      max-request-size: 300MB

# MyBatis 全局配置：snake_case 列 → camelCase 字段；启用结果缓存
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30
  # 全局注册 JSONB TypeHandler：所有 jdbcType=OTHER 的 JSONB 列自动 Object ↔ JSONB
  type-handlers-package: com.interview.agent.infra.db

# 业务自定义配置（LlmProperties / EmbeddingProperties / CorsProperties）
iagent:
  deploy-mode: ${IAGENT_DEPLOY_MODE:self_hosted}
  auth-mode: ${IAGENT_AUTH_MODE:single_user}
  interview:
    # 预分块策略：fixed（定长）| semantic（语义切分）。可用 IAGENT_CHUNK_STRATEGY 覆盖。
    chunk-strategy: ${IAGENT_CHUNK_STRATEGY:semantic}
    semantic:
      max-chars: ${IAGENT_SEMANTIC_MAX_CHARS:1600}    # 单段字符硬上限（防超 LLM 上下文）
      min-chars: ${IAGENT_SEMANTIC_MIN_CHARS:400}     # 单段字符下限（防碎片，未达不因语义切）
      threshold: ${IAGENT_SEMANTIC_THRESHOLD:0.6}     # 相邻两提问 embedding 余弦阈值（<则判话题切换）
  llm:
    chat-temperature-score: 0.0
    chat-temperature-generate: 0.6
  embedding:
    dashscope-api-key: ${DASHSCOPE_API_KEY:}
    model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}
    dimension: 1024
  cors:
    # 逗号分隔的允许来源模式；本地开发放行 localhost/127.0.0.1 任意端口
    allowed-origins: ${IAGENT_CORS_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  auth:
    # JWT 密钥必须与 Python 端 JWT_SECRET 相同，两端 token 才能互通
    jwt-secret: ${JWT_SECRET:}
    jwt-expire-days: ${JWT_EXPIRE_DAYS:30}
    github-client-id: ${GITHUB_CLIENT_ID:}
    github-client-secret: ${GITHUB_CLIENT_SECRET:}
    frontend-url: ${FRONTEND_URL:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.interview.agent: DEBUG
    org.flywaydb: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
