server:
  port: 8080
  # 让 Spring MVC 在虚拟线程上承载请求
  # (与 spring.threads.virtual.enabled 协同)

spring:
  application:
    name: interview-agent
  profiles:
    active: dev
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/interview_agent_java}
    username: ${DB_USER:iagent_java}
    password: ${DB_PASSWORD:iagent_java}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 2
      connection-timeout: 30000
      pool-name: iagent-hikari

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    table: flyway_schema_history

  # Spring AI: 用 OpenAI starter 指向 DeepSeek（OpenAI 兼容）
  # base-url 硬编码不读 .env 的 DEEPSEEK_BASE_URL —— 那个变量是 Python 用的（带 /v1），
  # Spring AI 会自动追加 /v1/chat/completions，再带 /v1 会变成 /v1/v1/...
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}
          temperature: 0.3
  # LLM 长输出（讲解 4096 token / 题目 5 道）需要更长的 HTTP 读超时
  http:
    client:
      connect-timeout: 30s
      read-timeout: 180s

  # 全局 Jackson：HTTP 请求/响应字段统一 snake_case（与 Python 端 + 前端约定一致）
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL

# MyBatis 全局配置：snake_case 列 → camelCase 字段；启用结果缓存
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30
  # 全局注册 JSONB TypeHandler：所有 jdbcType=OTHER 的 JSONB 列自动 Object ↔ JSONB
  type-handlers-package: com.interview.agent.infra.db

# 业务自定义配置（LlmProperties / EmbeddingProperties / CorsProperties）
iagent:
  llm:
    chat-temperature-score: 0.0
    chat-temperature-generate: 0.6
  embedding:
    dashscope-api-key: ${DASHSCOPE_API_KEY:}
    model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}
    dimension: 1024
  cors:
    # 逗号分隔的允许来源；前端 Vite 默认 5173
    allowed-origins: ${IAGENT_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.interview.agent: DEBUG
    org.flywaydb: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
